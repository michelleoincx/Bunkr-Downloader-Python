<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunkr Storage - Безопасное хранилище данных</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f0f0f;
            --secondary: #1a1a1a;
            --accent: #00d9ff;
            --accent-dark: #0099cc;
            --success: #00ff88;
            --danger: #ff0055;
            --text: #e0e0e0;
            --text-muted: #808080;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, #0a1420 100%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 217, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 255, 136, 0.03) 0%, transparent 50%);
            pointer-events: none;
            animation: drift 20s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        header {
            margin-bottom: 60px;
            animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            font-family: 'Space Mono', monospace;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 3px;
            background: linear-gradient(90deg, var(--accent), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo::before {
            content: '⚡';
            font-size: 28px;
        }

        .info {
            font-size: 13px;
            color: var(--text-muted);
            font-family: 'Space Mono', monospace;
            letter-spacing: 1px;
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 40px;
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Panel Styling */
        .panel {
            background: linear-gradient(135deg, var(--secondary) 0%, rgba(26, 26, 26, 0.8) 100%);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 16px;
            padding: 32px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .panel-header::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: var(--accent);
            text-transform: uppercase;
        }

        input[type="text"],
        input[type="password"],
        textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(0, 217, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
            font-family: 'Space Mono', monospace;
        }

        /* Button Styles */
        .btn {
            padding: 12px 24px;
            background: linear-gradient(90deg, var(--accent), var(--accent-dark));
            color: var(--primary);
            border: none;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 217, 255, 0.4);
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(0, 217, 255, 0.1);
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .btn-secondary:hover {
            background: rgba(0, 217, 255, 0.2);
        }

        .btn-danger {
            background: rgba(255, 0, 85, 0.3);
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 8px 16px;
            font-size: 12px;
            width: auto;
        }

        .btn-danger:hover {
            background: rgba(255, 0, 85, 0.5);
        }

        /* Items List */
        .items-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
        }

        .items-container::-webkit-scrollbar {
            width: 6px;
        }

        .items-container::-webkit-scrollbar-track {
            background: rgba(0, 217, 255, 0.05);
            border-radius: 10px;
        }

        .items-container::-webkit-scrollbar-thumb {
            background: rgba(0, 217, 255, 0.3);
            border-radius: 10px;
        }

        .items-container::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 217, 255, 0.5);
        }

        .item {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(0, 217, 255, 0.15);
            border-radius: 8px;
            padding: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            animation: itemSlide 0.3s ease-out;
        }

        @keyframes itemSlide {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .item-label {
            flex: 1;
            font-weight: 600;
            color: var(--accent);
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        .item-value {
            flex: 2;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--text-muted);
            word-break: break-all;
        }

        .item-actions {
            display: flex;
            gap: 8px;
        }

        /* Bunkers Grid */
        .bunkers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            animation: fadeIn 0.8s ease-out 0.3s both;
        }

        .bunker-card {
            background: linear-gradient(135deg, var(--secondary) 0%, rgba(26, 26, 26, 0.6) 100%);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 12px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .bunker-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .bunker-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0, 217, 255, 0.2);
        }

        .bunker-card:hover::before {
            opacity: 1;
        }

        .bunker-card-content {
            position: relative;
            z-index: 1;
        }

        .bunker-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(90deg, var(--accent), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .bunker-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 14px;
        }

        .bunker-count {
            background: rgba(0, 217, 255, 0.1);
            color: var(--accent);
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        .modal-content {
            background: var(--secondary);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-header {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--accent);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 28px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: var(--danger);
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: rgba(0, 217, 255, 0.05);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .header-content {
                flex-direction: column;
                align-items: flex-start;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .bunkers-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 24px;
            }
        }

        /* Loading Animation */
        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        @keyframes bounce {
            0%, 80%, 100% { opacity: 0.3; }
            40% { opacity: 1; }
        }

        /* Success Message */
        .success-msg {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            animation: slideDown 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="logo">BUNKR</div>
                <div class="info">v1.0 • Secure Storage System</div>
            </div>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalBunkers">0</div>
                <div class="stat-label">Бункеры</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalItems">0</div>
                <div class="stat-label">Элементы</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalStorage">0 KB</div>
                <div class="stat-label">Размер</div>
            </div>
        </div>

        <div class="main-grid">
            <!-- Create Bunker Panel -->
            <div class="panel">
                <div class="panel-header">Создать бункер</div>
                <div class="form-group">
                    <label for="bunkerName">Имя бункера</label>
                    <input type="text" id="bunkerName" placeholder="Мои секреты" />
                </div>
                <button class="btn" onclick="createBunker()">Создать</button>
            </div>

            <!-- Bunkers Grid -->
            <div class="bunkers-grid" id="bunkersGrid">
                <div class="empty-state">
                    <div class="empty-icon">🔒</div>
                    <p>Нет бункеров. Создайте первый!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bunker Details Modal -->
    <div class="modal" id="bunkerModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeBunkerModal()">✕</button>
            <div class="modal-header" id="modalBunkerName"></div>

            <div class="form-group">
                <label for="itemLabel">Название элемента</label>
                <input type="text" id="itemLabel" placeholder="Например: API ключ" />
            </div>
            <div class="form-group">
                <label for="itemValue">Значение</label>
                <textarea id="itemValue" placeholder="Введите значение для сохранения..."></textarea>
            </div>
            <button class="btn" onclick="addItem()">Добавить элемент</button>

            <div style="margin-top: 30px;">
                <div style="font-size: 13px; color: var(--accent); margin-bottom: 16px; letter-spacing: 1px; text-transform: uppercase;">Элементы в бункере</div>
                <div class="items-container" id="itemsList"></div>
            </div>

            <button class="btn btn-secondary" onclick="deleteBunker()" style="margin-top: 24px;">Удалить бункер</button>
        </div>
    </div>

    <script>
        let currentBunkerId = null;

        // Load bunkers on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadBunkers();
            setInterval(loadBunkers, 5000); // Refresh every 5 seconds
        });

        async function loadBunkers() {
            try {
                const response = await fetch('/api/bunkers');
                const bunkers = await response.json();

                const grid = document.getElementById('bunkersGrid');
                
                if (bunkers.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">🔒</div>
                            <p>Нет бункеров. Создайте первый!</p>
                        </div>
                    `;
                } else {
                    grid.innerHTML = bunkers.map(bunker => `
                        <div class="bunker-card" onclick="openBunker('${bunker.id}')">
                            <div class="bunker-card-content">
                                <div class="bunker-name">${escapeHtml(bunker.name)}</div>
                                <div class="bunker-meta">
                                    <span>${new Date(bunker.created).toLocaleDateString('ru-RU')}</span>
                                    <span class="bunker-count">${bunker.itemCount} элементов</span>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }

                // Update stats
                let totalItems = 0;
                bunkers.forEach(b => totalItems += b.itemCount);
                document.getElementById('totalBunkers').textContent = bunkers.length;
                document.getElementById('totalItems').textContent = totalItems;
                document.getElementById('totalStorage').textContent = 'N/A';
            } catch (error) {
                console.error('Error loading bunkers:', error);
            }
        }

        async function createBunker() {
            const name = document.getElementById('bunkerName').value.trim();
            if (!name) {
                alert('Введите имя бункера');
                return;
            }

            try {
                const response = await fetch('/api/bunkers', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });

                if (response.ok) {
                    document.getElementById('bunkerName').value = '';
                    loadBunkers();
                } else {
                    alert('Ошибка при создании бункера');
                }
            } catch (error) {
                console.error('Error creating bunker:', error);
                alert('Ошибка при создании бункера');
            }
        }

        async function openBunker(id) {
            currentBunkerId = id;
            try {
                const response = await fetch(`/api/bunkers/${id}`);
                const bunker = await response.json();

                document.getElementById('modalBunkerName').textContent = bunker.name;
                document.getElementById('itemLabel').value = '';
                document.getElementById('itemValue').value = '';

                const itemsList = document.getElementById('itemsList');
                if (bunker.items.length === 0) {
                    itemsList.innerHTML = '<p style="color: var(--text-muted); text-align: center;">Нет элементов</p>';
                } else {
                    itemsList.innerHTML = bunker.items.map(item => `
                        <div class="item">
                            <div class="item-label">${escapeHtml(item.label)}</div>
                            <div class="item-value">••••••••</div>
                            <div class="item-actions">
                                <button class="btn btn-danger" onclick="deleteItem('${item.id}')">Удалить</button>
                            </div>
                        </div>
                    `).join('');
                }

                document.getElementById('bunkerModal').classList.add('active');
            } catch (error) {
                console.error('Error opening bunker:', error);
                alert('Ошибка при открытии бункера');
            }
        }

        async function addItem() {
            const label = document.getElementById('itemLabel').value.trim();
            const value = document.getElementById('itemValue').value.trim();

            if (!label || !value) {
                alert('Заполните все поля');
                return;
            }

            try {
                const response = await fetch(`/api/bunkers/${currentBunkerId}/items`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ label, value })
                });

                if (response.ok) {
                    document.getElementById('itemLabel').value = '';
                    document.getElementById('itemValue').value = '';
                    openBunker(currentBunkerId); // Refresh
                    loadBunkers(); // Update stats
                }
            } catch (error) {
                console.error('Error adding item:', error);
                alert('Ошибка при добавлении элемента');
            }
        }

        async function deleteItem(itemId) {
            if (confirm('Вы уверены?')) {
                try {
                    const response = await fetch(`/api/bunkers/${currentBunkerId}/items/${itemId}`, {
                        method: 'DELETE'
                    });

                    if (response.ok) {
                        openBunker(currentBunkerId);
                        loadBunkers();
                    }
                } catch (error) {
                    console.error('Error deleting item:', error);
                }
            }
        }

        async function deleteBunker() {
            if (confirm('Удалить бункер и все его элементы? Это действие необратимо.')) {
                try {
                    const response = await fetch(`/api/bunkers/${currentBunkerId}`, {
                        method: 'DELETE'
                    });

                    if (response.ok) {
                        closeBunkerModal();
                        loadBunkers();
                    }
                } catch (error) {
                    console.error('Error deleting bunker:', error);
                }
            }
        }

        function closeBunkerModal() {
            document.getElementById('bunkerModal').classList.remove('active');
            currentBunkerId = null;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Close modal on ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeBunkerModal();
            }
        });
    </script>
</body>
</html>
